agents:
  information:
    collector:
      enabled: true
      timeout_seconds: 35
      max_workers: 12
      price_history_limit: 90
      include_macro: true
      include_options: true
      include_edgar: true
      include_a_share_metrics: true
      macro_symbols:
        - SPY
        - QQQ
        - ^VIX
        - GC=F
        - USDCNY=X
      providers:
        us_equity:
          enabled: true
          price: true
          weekly_price: true
          options: true
          edgar: true
          stooq_compat: false
          edgar_form4_limit: 8
        china_equity:
          enabled: true
          tencent: true
          mootdx: false
          mootdx_bar_offset: 120
          mootdx_realtime: true
          mootdx_financials: true
          mootdx_transactions: false
          mootdx_factory_options:
            market: std
            timeout: 15
        macro:
          enabled: true
          treasury: true
          fear_greed: true
          cme_fedwatch: true
          cftc: true
          cftc_commodities:
            - GOLD
            - CRUDE OIL
            - S&P 500
          cftc_limit: 8
          bis: false
          bis_countries:
            - US
            - CN
          bis_start_year: 2020
          bis_credit_start_year: 2018
          worldbank: false
          worldbank_countries:
            - US
            - CN
          worldbank_date_range: "2018:2026"
          worldbank_indicators:
            - NY.GDP.MKTP.CD
            - FP.CPI.TOTL.ZG
            - FR.INR.RINR
        prediction_markets:
          enabled: true
          kalshi: true
          kalshi_limit: 10
          kalshi_status: open
          kalshi_series_ticker:
          kalshi_event_ticker:
          kalshi_tickers: []
          polymarket: true
          polymarket_limit: 10
          polymarket_tag_slugs:
            - economy
            - crypto
            - fed
          polymarket_title_contains:
        crypto:
          enabled: true
          coingecko: true
          coin_ids:
            - bitcoin
            - ethereum
          market_limit: 20
          deribit: true
          deribit_currencies:
            - BTC
            - ETH
          deribit_options: true
        web_search:
          enabled: false
          max_results: 5
          queries: []
    model:
      provider: openrouter
      model: qwen/qwen3.5-plus-20260420
      temperature: 0.2
      api_key_env: OPENROUTER_API_KEY
      site_url: http://localhost
      app_title: multi-Agent-Inv

  bull:
    model:
      provider: openrouter
      model: qwen/qwen3.5-plus-20260420
      temperature: 0.5
      api_key_env: OPENROUTER_API_KEY
      site_url: http://localhost
      app_title: multi-Agent-Inv

  bear:
    model:
      provider: openrouter
      model: qwen/qwen3.5-plus-20260420
      temperature: 0.5
      api_key_env: OPENROUTER_API_KEY
      site_url: http://localhost
      app_title: multi-Agent-Inv

  judge:
    model:
      provider: openrouter
      model: qwen/qwen3.5-plus-20260420
      temperature: 0.1
      api_key_env: OPENROUTER_API_KEY
      site_url: http://localhost
      app_title: multi-Agent-Inv

  risk:
    model:
      provider: openrouter
      model: qwen/qwen3.5-plus-20260420
      temperature: 0.1
      api_key_env: OPENROUTER_API_KEY
      site_url: http://localhost
