<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stock Decision Console</title>
  </head>
  <body>
    <div class="app-shell">
      <!-- ===== Topbar ===== -->
      <header class="topbar">
        <div>
          <p class="eyebrow">Multi-Agent Decision Engine</p>
          <h1>股票策略计划</h1>
        </div>
        <div class="topbar-right">
          <div class="health" id="healthBadge">
            <span class="dot"></span>
            <span>检查配置</span>
          </div>
        </div>
      </header>

      <main class="workspace">
        <!-- ===== Left: Control Panel ===== -->
        <section class="control-panel" aria-label="决策输入">
          <div class="panel-header">
            <h2>决策参数</h2>
          </div>

          <div class="field">
            <label>运行模式</label>
            <div class="segmented mode-segments" role="radiogroup" aria-label="运行模式">
              <button class="segment active" data-run-mode="common" type="button">通用分析</button>
              <button class="segment" data-run-mode="a_share_daily" type="button">每日扫描</button>
              <button class="segment" data-run-mode="a_share_sector" type="button">指定板块</button>
              <button class="segment" data-run-mode="a_share_deep" type="button">指定个股</button>
            </div>
          </div>

          <div class="field" data-field="modelMode">
            <label>模型模式</label>
            <div class="segmented model-segments" role="radiogroup" aria-label="模型模式">
              <button class="segment active" data-model-mode="openrouter" type="button">OpenRouter</button>
              <button class="segment" data-model-mode="mock" type="button">Mock</button>
            </div>
          </div>

          <div class="field hidden" data-field="symbols">
            <label for="symbols">股票代码</label>
            <input id="symbols" value="" autocomplete="off" placeholder="可选，逗号分隔，如 AAPL,MSFT 或 600519" />
          </div>

          <div class="field hidden" data-field="sectors">
            <label for="sectors">板块名称</label>
            <input id="sectors" value="白酒,半导体,新能源" autocomplete="off" placeholder="逗号分隔，如 白酒,半导体" />
          </div>

          <div class="field hidden" data-field="riskTolerance">
            <label>风险偏好</label>
            <div class="segmented risk-segments" role="radiogroup" aria-label="风险偏好">
              <button class="segment" data-risk="conservative" type="button">保守</button>
              <button class="segment active" data-risk="moderate" type="button">稳健</button>
              <button class="segment" data-risk="aggressive" type="button">激进</button>
            </div>
          </div>

          <div class="field hidden" data-field="capital">
            <label for="capital">可用资金（元）</label>
            <input id="capital" value="1000000" inputmode="decimal" autocomplete="off" />
          </div>

          <div class="field">
            <label for="task">任务描述</label>
            <textarea id="task" rows="5">分析用户问题相关的宏观、市场和数据源信息，只输出信息分析报告，不生成股票交易决策。</textarea>
          </div>

          <div class="action-row">
            <button id="runButton" class="run-button" type="button">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="6 3 20 12 6 21 6 3"/></svg>
              <span>运行决策</span>
            </button>
            <button id="pauseButton" class="pause-button" type="button" disabled>
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
              <span>暂停</span>
            </button>
          </div>

          <div class="run-meta">
            <div>
              <span>耗时</span>
              <strong id="elapsed">0.0s</strong>
            </div>
            <div>
              <span>状态</span>
              <strong id="statusText">待运行</strong>
            </div>
          </div>
        </section>

        <!-- ===== Right: Process Panel ===== -->
        <section class="process-panel" aria-label="决策流程">
          <div class="panel-header">
            <h2>决策流程</h2>
          </div>
          <div class="pipeline" id="pipeline"></div>
          <div class="stage-grid" id="stageGrid"></div>
        </section>

        <!-- ===== Bottom: Result Panel ===== -->
        <section class="result-panel" aria-label="最终结果">
          <div class="panel-header">
            <div>
              <p class="eyebrow">Decision Output</p>
              <h2>阶段输出</h2>
            </div>
            <button id="copyButton" class="icon-button" type="button" title="复制结果">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
            </button>
          </div>

          <!-- Stage selector tabs -->
          <div class="result-tabs" id="resultTabs"></div>

          <!-- Summary / raw / source view switcher -->
          <div class="view-tabs" id="viewTabs" role="tablist" aria-label="输出视图">
            <button class="view-tab active" data-view="summary" type="button">摘要</button>
            <button class="view-tab" data-view="raw" type="button">原文</button>
            <button class="view-tab" data-view="sources" type="button">数据源</button>
          </div>

          <!-- Stage content viewer -->
          <div id="resultViewer" class="result-viewer">
            <div class="viewer-placeholder">
              <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
              <span>运行后显示各阶段报告</span>
            </div>
          </div>

          <!-- Final merged markdown -->
          <div class="final-divider">
            <span>完整汇总</span>
          </div>
          <div id="finalOutput" class="markdown empty">等待模型输出。</div>

          <div id="tradePlanPanel" class="trade-plan-panel hidden"></div>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
