<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stock Decision Console</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">LangGraph Multi-Agent</p>
          <h1>股票决策工作台</h1>
        </div>
        <div class="health" id="healthBadge">
          <span class="dot"></span>
          <span>检查配置</span>
        </div>
      </header>

      <main class="workspace">
        <section class="control-panel" aria-label="决策输入">
          <div class="field">
            <label for="symbols">股票代码</label>
            <input id="symbols" value="AAPL,MSFT,NVDA" autocomplete="off" />
          </div>

          <div class="field">
            <label for="task">任务</label>
            <textarea id="task" rows="5">筛选未来 1-3 个月的候选股票，输出做多/观望/回避建议，并说明风险控制条件。</textarea>
          </div>

          <div class="segmented" role="radiogroup" aria-label="模型模式">
            <button class="segment active" data-mode="openrouter" type="button">OpenRouter</button>
            <button class="segment" data-mode="mock" type="button">Mock</button>
          </div>

          <button id="runButton" class="run-button" type="button">
            <i data-lucide="play"></i>
            <span>运行决策</span>
          </button>

          <div class="run-meta">
            <div>
              <span>耗时</span>
              <strong id="elapsed">0.0s</strong>
            </div>
            <div>
              <span>状态</span>
              <strong id="statusText">待运行</strong>
            </div>
          </div>
        </section>

        <section class="process-panel" aria-label="决策流程">
          <div class="pipeline" id="pipeline"></div>
          <div class="stage-grid" id="stageGrid"></div>
        </section>

        <section class="result-panel" aria-label="最终结果">
          <div class="section-head">
            <div>
              <p class="eyebrow">Final</p>
              <h2>候选股票结果</h2>
            </div>
            <button id="copyButton" class="icon-button" type="button" title="复制结果">
              <i data-lucide="copy"></i>
            </button>
          </div>
          <div id="finalOutput" class="markdown empty">等待模型输出。</div>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.3/dist/purify.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/app.js"></script>
  </body>
</html>
